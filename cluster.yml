# ─────────────────────────────────────────────────────────────
# SmartBank EKS Cluster Configuration
# Creates a Kubernetes cluster on AWS with 2 worker nodes
# Run: eksctl create cluster -f cluster.yml
# ─────────────────────────────────────────────────────────────

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: smartbank-cluster
  region: ap-south-1        # Mumbai — closest to India
  version: "1.34"

# ── Node Groups (Worker Nodes) ────────────────────────────────
managedNodeGroups:
  - name: smartbank-nodes
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    volumeSize: 20

    spot: true   # ✅ NOW VALID

    ssh:
      allow: false          # disable SSH for security

# ── IAM Permissions ───────────────────────────────────────────
iam:
  withOIDC: true             # enables IAM roles for service accounts

# ── Add-ons ──────────────────────────────────────────────────
addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy