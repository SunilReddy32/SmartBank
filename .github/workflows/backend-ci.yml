# ─────────────────────────────────────────────────────────────
# SmartBank Backend CI/CD Pipeline
# Triggers: every push or PR to main branch
# Steps: Build → Test → Docker Build → Push to Docker Hub
# ─────────────────────────────────────────────────────────────

name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'

# These are loaded from GitHub Secrets (Settings → Secrets → Actions)
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/smartbank-backend
  JAVA_VERSION: '21'

jobs:

  # ── Job 1: Build and Test ────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Java 21
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven   # caches ~/.m2 so dependencies aren't re-downloaded every run

      # Step 3: Build the project with Maven
      # -DskipTests=false means tests WILL run
      - name: Build with Maven
        run: mvn clean package -B
        env:
          # Provide dummy values so the app can compile
          # Real values are only needed at runtime, not compile time
          DB_PASSWORD: dummy
          MAIL_USERNAME: dummy@gmail.com
          MAIL_PASSWORD: dummy

      # Step 4: Upload test results so you can see them in GitHub Actions UI
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()   # upload even if tests fail
        with:
          name: test-results
          path: target/surefire-reports/

      # Step 5: Upload the built jar as an artifact
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartbank-jar
          path: target/smartbank-1.0.0.jar
          retention-days: 1

  # ── Job 2: Docker Build and Push ─────────────────────────
  # Only runs on push to main (not on PRs — we don't want to push images from PRs)
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test   # only runs if Job 1 passed
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to Docker Hub using secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Set up Docker Buildx — enables multi-platform builds and better caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Generate image tags:
      # - latest (always points to newest)
      # - git SHA (immutable, for rollbacks)
      # Example: myuser/smartbank-backend:latest
      #          myuser/smartbank-backend:abc1234
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      # Build Docker image and push to Docker Hub
      - name: Build and push Docker image
        id: build-and-push 
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between builds — speeds up subsequent builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Print the image digest for reference
      - name: Print image digest
        run: echo "Image pushed with digest ${{ steps.build-and-push.outputs.digest }}"