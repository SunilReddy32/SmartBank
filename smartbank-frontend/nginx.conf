server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router — without this, refreshing any page
    # except "/" gives a 404 because Nginx looks for a real file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend
    # Frontend calls /api/... → Nginx forwards to backend:9090/...
    location /api/ {
        proxy_pass http://smartbank-backend-service:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache static assets for 1 year (images, js, css)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}