# ─────────────────────────────────────────────────────────────
# Grafana Dashboard — NEW FILE
# Pre-built SmartBank dashboard with 8 panels:
#   HTTP requests/s, response time p95, JVM memory,
#   JVM threads, error rate, CPU, DB connections, GC pause
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: smartbank
data:
  smartbank.json: |
    {
      "id": null,
      "uid": "smartbank-overview",
      "title": "SmartBank Overview",
      "tags": ["smartbank", "spring-boot"],
      "timezone": "browser",
      "schemaVersion": 27,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1, "type": "graph",
          "title": "HTTP Requests per Second",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "rate(http_server_requests_seconds_count{job=\"smartbank-backend\"}[1m])",
            "legendFormat": "{{method}} {{uri}} ({{status}})", "refId": "A"
          }],
          "yaxes": [{"format": "reqps", "label": "req/s"}, {"format": "short"}]
        },
        {
          "id": 2, "type": "graph",
          "title": "HTTP Response Time p95 (seconds)",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{job=\"smartbank-backend\"}[5m]))",
            "legendFormat": "p95 {{uri}}", "refId": "A"
          }],
          "yaxes": [{"format": "s", "label": "seconds"}, {"format": "short"}]
        },
        {
          "id": 3, "type": "graph",
          "title": "JVM Heap Memory Used",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [{
            "expr": "jvm_memory_used_bytes{job=\"smartbank-backend\", area=\"heap\"}",
            "legendFormat": "{{id}}", "refId": "A"
          }],
          "yaxes": [{"format": "bytes", "label": "bytes"}, {"format": "short"}]
        },
        {
          "id": 4, "type": "graph",
          "title": "JVM Threads",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            { "expr": "jvm_threads_live_threads{job=\"smartbank-backend\"}", "legendFormat": "Live", "refId": "A" },
            { "expr": "jvm_threads_daemon_threads{job=\"smartbank-backend\"}", "legendFormat": "Daemon", "refId": "B" }
          ],
          "yaxes": [{"format": "short", "label": "threads"}, {"format": "short"}]
        },
        {
          "id": 5, "type": "graph",
          "title": "HTTP 5xx Error Rate",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [{
            "expr": "rate(http_server_requests_seconds_count{job=\"smartbank-backend\", status=~\"5..\"}[1m])",
            "legendFormat": "{{uri}}", "refId": "A"
          }],
          "yaxes": [{"format": "reqps", "label": "errors/s"}, {"format": "short"}]
        },
        {
          "id": 6, "type": "graph",
          "title": "Process CPU Usage",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "targets": [{
            "expr": "process_cpu_usage{job=\"smartbank-backend\"}",
            "legendFormat": "CPU %", "refId": "A"
          }],
          "yaxes": [{"format": "percentunit", "label": "cpu"}, {"format": "short"}]
        },
        {
          "id": 7, "type": "graph",
          "title": "HikariCP DB Connection Pool",
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 8 },
          "targets": [
            { "expr": "hikaricp_connections_active{job=\"smartbank-backend\"}", "legendFormat": "Active", "refId": "A" },
            { "expr": "hikaricp_connections_pending{job=\"smartbank-backend\"}", "legendFormat": "Pending", "refId": "B" },
            { "expr": "hikaricp_connections_idle{job=\"smartbank-backend\"}", "legendFormat": "Idle", "refId": "C" }
          ],
          "yaxes": [{"format": "short", "label": "connections"}, {"format": "short"}]
        },
        {
          "id": 8, "type": "graph",
          "title": "JVM GC Pause Time",
          "gridPos": { "x": 12, "y": 24, "w": 12, "h": 8 },
          "targets": [{
            "expr": "rate(jvm_gc_pause_seconds_sum{job=\"smartbank-backend\"}[1m])",
            "legendFormat": "{{action}} - {{cause}}", "refId": "A"
          }],
          "yaxes": [{"format": "s", "label": "pause time"}, {"format": "short"}]
        }
      ]
    }
