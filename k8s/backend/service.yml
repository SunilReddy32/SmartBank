# ─────────────────────────────────────────────────────────────
# Backend Service
# ClusterIP = internal only (frontend calls this inside cluster)
# NodePort added so you can also test API directly from browser
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: smartbank-backend-service
  namespace: smartbank
  labels:
    app: smartbank-backend
spec:
  type: NodePort
  selector:
    app: smartbank-backend
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090 # access at http://$(minikube ip):30090
      protocol: TCP
