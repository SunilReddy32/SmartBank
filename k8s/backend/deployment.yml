apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartbank-backend
  namespace: smartbank
  labels:
    app: smartbank-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartbank-backend
  template:
    metadata:
      labels:
        app: smartbank-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "9090"
    spec:
      # Wait for MySQL to be ready before starting backend
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z smartbank-mysql-service 3306; do
                echo "Waiting for MySQL...";
                sleep 3;
              done;
              echo "MySQL is ready!"
      containers:
        - name: smartbank-backend
          image: sunilreddy32/smartbank-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9090

          # Non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: smartbank-config

          # Sensitive values — names MUST match ${VAR} in application.properties
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smartbank-secrets
                  key: DB_USERNAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secrets
                  key: DB_PASSWORD

            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smartbank-secrets
                  key: MAIL_USERNAME

            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secrets
                  key: MAIL_PASSWORD

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          # Liveness — if this fails 3 times, pod is restarted
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 150
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness — pod only gets traffic when this passes
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 130
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
