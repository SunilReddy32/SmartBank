# ─────────────────────────────────────────────────────────────
# Backend Deployment
# Tells Kubernetes: run 1 copy of the backend container
# (1 replica on Minikube to save resources)
# ─────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartbank-backend
  namespace: smartbank
  labels:
    app: smartbank-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartbank-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: smartbank-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "9090"
    spec:
      # Wait for MySQL to be reachable before starting backend
      initContainers:
        - name: wait-for-db
          image: busybox:1.35
          command:
            [
              "sh",
              "-c",
              'until nc -z smartbank-db-service 3306; do echo "waiting for MySQL..."; sleep 5; done',
            ]

      containers:
        - name: smartbank-backend
          image: sunilreddy32/smartbank-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9090

          envFrom:
            - configMapRef:
                name: smartbank-config

          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smartbank-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secrets
                  key: DB_PASSWORD
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smartbank-secrets
                  key: MAIL_USERNAME
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartbank-secrets
                  key: MAIL_PASSWORD
            # ✅ FIXED: Points to in-cluster MySQL (was YOUR_RDS_ENDPOINT)
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://smartbank-db-service:3306/smartbank?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
