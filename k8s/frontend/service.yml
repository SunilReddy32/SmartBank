# ─────────────────────────────────────────────────────────────
# Frontend Service
# ✅ FIXED: Changed from LoadBalancer (AWS) to NodePort (Minikube)
# Access via: minikube service smartbank-frontend-service -n smartbank
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: smartbank-frontend-service
  namespace: smartbank
  labels:
    app: smartbank-frontend
spec:
  type: NodePort # ✅ Works on Minikube (was LoadBalancer/AWS)
  selector:
    app: smartbank-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080 # access at http://$(minikube ip):30080
      protocol: TCP
