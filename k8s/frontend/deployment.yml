apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartbank-frontend
  namespace: smartbank
  labels:
    app: smartbank-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartbank-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: smartbank-frontend
    spec:
      containers:
        - name: smartbank-frontend
          # Replace YOUR_DOCKERHUB_USERNAME with your actual username
          image: sunilreddy32/smartbank-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10